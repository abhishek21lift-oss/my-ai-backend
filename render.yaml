services:
  # ── FastAPI web API ──────────────────────────────────────────────────────────
  - type: web
    name: viralai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: viralai-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: viralai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: viralai-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
    plan: free

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: viralai-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

# ── PostgreSQL database ───────────────────────────────────────────────────────
databases:
  - name: viralai-db
    plan: free
    databaseName: viralai
    user: viralai
